<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The CyberJai | Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>

<body>

    <div class="grid-bg"></div>
    <div id="glow"></div>

    <nav>
        <a href="index.html" class="logo">The CyberJai</a>

        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="tools.html" class="active">Tools</a>
            <a href="contact.html">Contact Us</a>
        </div>

        <div class="nav-right">
            <button id="themeToggle" aria-label="Toggle Theme"></button>
        </div>
    </nav>

    <main style="align-items: flex-start; text-align: left; max-width: 1200px; margin: 0 auto; padding-top: 5rem; padding-bottom: 5rem;">
        <h1 class="animate" style="animation-delay: 0.1s; font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 1.5rem;">
            <span class="title-white">Tools Arsenal</span>
        </h1>

        <p class="subtitle animate"
            style="animation-delay: 0.2s; max-width: 100%; text-align: left; margin: 0 0 3rem 0;">
            Explore custom-built utilities designed specifically for bug bounty hunting, scanning, and penetration
            testing workflows, along with comprehensive guides to the best open-source resources.
        </p>

        <style>
            .tools-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 2rem;
                width: 100%;
                margin-top: 3rem;
                align-items: start;
            }

            @media (max-width: 1024px) {
                .tools-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }

            @media (max-width: 768px) {
                .tools-grid {
                    grid-template-columns: 1fr;
                }
            }

            /* Smooth Details Tag Opening */
            details.tool-box summary {
                list-style: none;
                box-sizing: border-box;
            }

            details.tool-box summary::-webkit-details-marker {
                display: none;
            }

            details.tool-box {
                transition: all 0.3s ease;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                overflow: hidden;
                width: 100%;
            }

            details.tool-box:not([open]) {
                aspect-ratio: 1 / 1;
            }

            details.tool-box:hover {
                border-color: rgba(178, 195, 167, 0.4);
            }

            details.tool-box summary {
                padding: 2rem;
                cursor: pointer;
                user-select: none;
                transition: all 0.3s ease;
            }

            /* Display styles for closed (square) state */
            details.tool-box:not([open]) summary {
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                gap: 1.5rem;
            }

            /* Display styles for open (list/expanded) state */
            details.tool-box[open] summary {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                text-align: left;
            }

            details.tool-box[open] summary svg.dropdown-icon {
                transform: rotate(180deg);
                color: var(--accent);
            }

            details.tool-box h2 {
                font-size: 1.8rem;
                color: var(--text-main);
                margin: 0;
            }

            details.tool-box:not([open]) h2 {
                flex-direction: column;
            }
            
            details.tool-box[open] h2 {
                display: flex;
                align-items: center;
                gap: 1rem;
            }

            details.tool-box span.badge-tag {
                font-size: 0.9rem;
                color: var(--text-muted);
                background: rgba(255,255,255,0.05);
                padding: 0.3rem 0.8rem;
                border-radius: 20px;
                display: inline-block;
            }
            
            /* Hide the dropdown icon in square mode */
            details.tool-box:not([open]) svg.dropdown-icon {
                display: none;
            }
        
            .tools-grid a.tool-box:hover {
                border-color: rgba(178, 195, 167, 0.4);
                transform: translateY(-5px);
            }
</style>

        <div class="tools-grid">

        <a href="tool-openant.html" class="tool-box animate" style="text-decoration: none; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 1.5rem; padding: 2rem; aspect-ratio: 1/1; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 12px; transition: all 0.3s ease;">
            <h2 style="font-size: 1.8rem; color: var(--text-main); margin: 0;">OpenAnt</h2>
            <span
                    style="font-size: 0.9rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 0.3rem 0.8rem; border-radius: 20px;">Vulnerability
                    Discovery</span>
        </a>
</div>
    </main>

    <script src="script.js"></script>
</body>

</html>
